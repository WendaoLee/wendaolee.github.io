bel="文章描述">&quot;个人关于 fp-ts 的库函数的一些笔记。&quot;</p><hr class="my-4"/><h2 id="1-chain--flatmap"><a class="anchor" href="#1-chain--flatmap"><span class="icon icon-link"></span></a>1. <code>chain = flatMap</code></h2>
<p class="text-base leading-7"><code>chain</code> 做的事情（mapping and then flattening）：</p>
<ol>
<li>检查是否有值</li>
<li>如果有值，则将该值传入函数，并返回一个新的被包装的类型</li>
</ol>
<figure data-rehype-pretty-code-figure=""><pre style="background-color:#282c34;color:#abb2bf" tabindex="0" data-language="typescript" data-theme="one-dark-pro"><code data-language="typescript" data-theme="one-dark-pro" style="display:grid"><span data-line=""><span style="color:#C678DD">import</span><span style="color:#D19A66"> *</span><span style="color:#C678DD"> as</span><span style="color:#E06C75"> O</span><span style="color:#C678DD"> from</span><span style="color:#98C379"> &#x27;fp-ts/Option&#x27;</span></span>
<span data-line=""> </span>
<span data-line=""><span style="color:#61AFEF">pipe</span><span style="color:#ABB2BF">(</span></span>
<span data-line=""><span style="color:#E06C75">    ns</span><span style="color:#ABB2BF">,</span></span>
<span data-line=""><span style="color:#E06C75">    head</span><span style="color:#ABB2BF">,</span></span>
<span data-line=""><span style="color:#E5C07B">    O</span><span style="color:#ABB2BF">.</span><span style="color:#61AFEF">map</span><span style="color:#ABB2BF">(</span><span style="color:#E06C75">inverse</span><span style="color:#ABB2BF">)</span></span>
<span data-line=""><span style="color:#E5C07B">    O</span><span style="color:#ABB2BF">.</span><span style="color:#E06C75">flatten</span></span>
<span data-line=""><span style="color:#ABB2BF">)</span></span>
<span data-line=""> </span>
<span data-line=""><span style="color:#7F848E;font-style:italic">// 等价于</span></span>
<span data-line=""><span style="color:#61AFEF">pipe</span><span style="color:#ABB2BF">(</span></span>
<span data-line=""><span style="color:#E06C75">    ns</span><span style="color:#ABB2BF">,</span></span>
<span data-line=""><span style="color:#E06C75">    head</span><span style="color:#ABB2BF">,</span></span>
<span data-line=""><span style="color:#E5C07B">    O</span><span style="color:#ABB2BF">.</span><span style="color:#61AFEF">chain</span><span style="color:#ABB2BF">(</span><span style="color:#E06C75">inverse</span><span style="color:#ABB2BF">)</span></span>
<span data-line=""><span style="color:#ABB2BF">)</span></span></code></pre></figure>

<figure data-rehype-pretty-code-figure=""><pre style="background-color:#282c34;color:#abb2bf" tabindex="0" data-language="typescript" data-theme="one-dark-pro"><code data-language="typescript" data-theme="one-dark-pro" style="display:grid"><span data-line=""><span style="color:#C678DD">const</span><span style="color:#61AFEF"> isEven</span><span style="color:#56B6C2"> =</span><span style="color:#ABB2BF"> (</span><span style="color:#E06C75;font-style:italic">n</span><span style="color:#ABB2BF">: </span><span style="color:#E5C07B">number</span><span style="color:#ABB2BF">) </span><span style="color:#C678DD">=&gt;</span><span style="color:#E06C75"> n</span><span style="color:#56B6C2"> %</span><span style="color:#D19A66"> 2</span><span style="color:#56B6C2"> ===</span><span style="color:#D19A66"> 0</span></span>
<span data-line=""> </span>
<span data-line=""><span style="color:#C678DD">const</span><span style="color:#E5C07B"> getEven</span><span style="color:#56B6C2"> =</span><span style="color:#E5C07B"> O</span><span style="color:#ABB2BF">.</span><span style="color:#61AFEF">fromPredicate</span><span style="color:#ABB2BF">(</span><span style="color:#E06C75">isEven</span><span style="color:#ABB2BF">) </span><span style="color:#7F848E;font-style:italic">// Option&lt;number&gt;</span></span>
<span data-line=""> </span>
<span data-line=""><span style="color:#C678DD">type</span><span style="color:#E5C07B"> Shape</span><span style="color:#56B6C2"> =</span><span style="color:#E5C07B"> Circle</span><span style="color:#ABB2BF"> | </span><span style="color:#E5C07B">Square</span></span>
<span data-line=""> </span>

<span data-line=""> </span>
